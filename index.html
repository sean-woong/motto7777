<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>MOTTO 7777 – V3</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="bg-glitch"></div>

  <!-- Intro 풀스크린 GIF -->
  <section id="intro" class="intro">
    <img src="ani_motto.gif" alt="MOTTO 7777 Opening" class="intro-gif"/>
  </section>

  <!-- 본문, opacity 0 → 3초 후 fade-in -->
  <main id="mainContent" style="opacity:0;">
    <!-- Slogan 섹션 -->
    <section class="section" data-audio="slogan.mp3">
      <h1 class="fade-up">this is not an interface.</h1>
      <p class="fade-up delay">this is a leak.</p>
      <p class="fade-up delay2">this is a hallucination left open.</p>
    </section>

    <!-- Dealer 섹션 -->
    <section class="section" data-audio="dealer.mp3">
      <h2 class="slide-in">DEALER</h2>
      <img class="glitch-img" src="dealer_cut.jpg" alt="Dealer"/>
    </section>

    <!-- Skull 섹션 -->
    <section class="section" data-audio="skull.mp3">
      <h2 class="slide-in">SKULL</h2>
      <img class="glitch-img" src="skull_cut.jpg" alt="Skull"/>
    </section>

    <!-- Statement 섹션 -->
    <section class="section" data-audio="statement.mp3">
      <p class="typewriter">identity corrupted. system resilient.</p>
    </section>

    <!-- Gallery 섹션 -->
    <section class="gallery">
      <div class="gallery-grid">
        <div class="image-card"><img src="assets/image1.jpg" alt="Art 1"></div>
        <div class="image-card"><img src="assets/image2.jpg" alt="Art 2"></div>
        <div class="image-card"><img src="assets/image3.jpg" alt="Art 3"></div>
        <div class="image-card"><img src="assets/image4.jpg" alt="Art 4"></div>
        <!-- 필요에 따라 복제하세요 -->
      </div>
    </section>
  </main>

  <audio id="sfx"></audio>
  <script src="script.js"></script>
</body>
</html>
